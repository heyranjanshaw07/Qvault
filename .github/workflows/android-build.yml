name: 🤖 Build QVault Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install web dependencies ─────────────────────────────────────────
      - name: Install project dependencies
        run: npm install --legacy-peer-deps

      # ── 4. Build web app (Android config — no viteSingleFile) ───────────────
      - name: Build web app for Android
        run: npx vite build --config vite.config.android.ts

      # ── 5. Java 17 ──────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 6. Sync web assets into Android project ──────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 10. Copy app icon & splash ───────────────────────────────────────────
      - name: Copy app icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            cp assets/icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          fi

      # ── 11. Build debug APK ──────────────────────────────────────────────────
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 12. Upload APK as downloadable artifact ──────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QVault-Android-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. Show APK info ────────────────────────────────────────────────────
      - name: APK build summary
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "✅ APK built successfully!"
            echo "📦 Size: $APK_SIZE"
            echo "📁 Path: $APK_PATH"
          else
            echo "❌ APK not found!"
            exit 1
          fi
